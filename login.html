<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Raízes do Nordeste</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>
    <div class="logo">
        <img src="assets/icons/logo.png" alt="Logo Raízes do Nordeste">
        <span>Raízes do Nordeste</span>
    </div>

    <nav>
        <a href="index.html">Início</a>
        <a href="cardapio.html">Cardápio</a>
        <a href="fidelidade.html">Fidelidade</a>
    </nav>
</header>

<main class="login-page">

    <div class="login-card">

        <h1>Entrar</h1>

        <p>
            Faça login para acessar seus pedidos, promoções e benefícios.
        </p>

        <form>

            <label>Email</label>

            <input
                type="email"
                placeholder="seuemail@exemplo.com"
            >

            <label>Senha</label>

            <input
                type="password"
                placeholder="Digite sua senha"
            >

            <a href="index.html" class="btn-link">Entrar</a>

        </form>

        <div class="login-links">

            <a href="cadastro.html">
                Criar conta
            </a>

        </div>

    </div>

</main>

</body>

</html>
